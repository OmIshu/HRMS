name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Render
        run: |
          if [ -z "$RENDER_SERVICE_ID" ] || [ -z "$RENDER_API_KEY" ]; then
            echo "Render credentials not configured. Set RENDER_SERVICE_ID and RENDER_API_KEY secrets."
            exit 1
          fi
          curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "accept: application/json" \
            -H "authorization: Bearer $RENDER_API_KEY"

      - name: Notify deployment
        if: success()
        run: echo "✅ Backend deployed successfully to Render"

      - name: Notify deployment failure
        if: failure()
        run: echo "❌ Deployment to Render failed. Check logs above."
